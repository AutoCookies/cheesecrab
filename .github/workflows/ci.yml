name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 black
        
    - name: Run Linter (Black)
      run: |
        black --check cheese_api/ tests/ integrations/ scripts/
        
    - name: Run Linter (Flake8)
      run: |
        flake8 cheese_api/ tests/ integrations/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Automated Pytest Suite
      env:
        CHEESE_API_KEY: "test-admin-key"
      run: |
        pytest tests/test_api.py -v
